limit_req_zone $binary_remote_addr zone=norevia_api:10m rate=20r/s;
server {
    listen 80;
    listen [::]:80;
    server_name norevia.example.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name norevia.example.com;
    ssl_certificate /etc/letsencrypt/live/norevia.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/norevia.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    root /opt/norevia/current/apps/web/dist;
    index index.html;
    location /api/ {
        limit_req zone=norevia_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location = /service-worker.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
    access_log /var/log/nginx/norevia.access.log;
    error_log /var/log/nginx/norevia.error.log warn;
}
